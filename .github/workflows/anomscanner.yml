name: anomscanner-daily

on:
  schedule:
    - cron: "30 11 * * 1-5"   # weekdays 11:30 UTC
  workflow_dispatch: {}        # manual run button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UW_API_KEY: ${{ secrets.UW_API_KEY }}   # optional; leave secret unset to skip the options layer
          ANOMTARA_MODEL: claude-sonnet-4-6
          GMAIL_USER: ${{ secrets.GMAIL_USER }}                 # optional; e-mail notification
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }} # optional; Gmail app password
          MAIL_TO: ${{ secrets.MAIL_TO }}                       # optional; defaults to GMAIL_USER
          SITE_BASE_URL: https://ekmelcilingir-pixel.github.io/anomscanner
        run: python main.py
      - name: Commit report + manifest
        run: |
          git config user.name  "anomscanner-bot"
          git config user.email "anomscanner-bot@users.noreply.github.com"
          git add docs/reports docs/manifest.json
          git commit -m "anomscanner report $(date -u +%F)" || echo "nothing to commit"
          git push
