<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Anomscanner — Portfolio Platform</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel-2:#1c2128; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e; --green:#27c281; --blue:#5ba7ff; --red:#ff5d6c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  main{padding:32px;max-width:1100px;margin:0 auto}
  @media(max-width:767px){main{padding:16px}}
  .stack{display:flex;flex-direction:column;gap:16px}
  header.page{display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:12px}
  h1{font-size:24px;font-weight:800;letter-spacing:-.01em}
  .subtitle{margin-top:4px;font-size:13.5px;color:var(--muted)}
  .controls{display:flex;align-items:center;gap:12px}
  .controls label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  select{border-radius:6px;border:1px solid var(--border);background:var(--panel-2);
    color:var(--text);padding:6px 12px;font-size:13.5px;font-variant-numeric:tabular-nums;max-width:60vw}
  select:focus{outline:none;border-color:var(--green)}
  .meta-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);gap:12px;flex-wrap:wrap}
  iframe.report{height:calc(100vh - 180px);width:100%;border-radius:10px;border:1px solid var(--border);background:#0d1117}
  .empty{padding:40px;text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:10px}
  a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
</style>
</head>
<body>
<main>
  <div class="stack">
    <header class="page">
      <div>
        <h1>Anomscanner Reports</h1>
        <p class="subtitle">Portfolio + watchlist anomaly scan — price/volume z-score, trend breaks, options/derivatives (if configured), calendar, news divergence</p>
      </div>
      <div class="controls">
        <label for="picker">Date</label>
        <select id="picker"></select>
      </div>
    </header>

    <div class="meta-row">
      <span id="meta">Loading…</span>
      <a href="./manifest.json" target="_blank">manifest →</a>
    </div>

    <iframe id="frame" class="report" title="Anomscanner report"></iframe>
    <div id="empty" class="empty" style="display:none">
      No reports yet. The daily job writes <code>reports/anomtara-YYYY-MM-DD-*.html</code> and updates <code>manifest.json</code>.
    </div>
  </div>
</main>

<script>
const picker = document.getElementById('picker');
const frame  = document.getElementById('frame');
const meta   = document.getElementById('meta');
const empty  = document.getElementById('empty');

function fmt(iso){ try{ const d=new Date(iso); return d.toLocaleString(); }catch(e){ return iso; } }

function load(entry){
  frame.src = './reports/' + entry.filename;
  const flagged = (entry.flagged && entry.flagged.length) ? ' · flagged: ' + entry.flagged.join(', ') : '';
  meta.textContent = entry.for_date + ' · generated ' + fmt(entry.generated_at) + flagged;
}

fetch('./manifest.json', {cache:'no-store'})
  .then(r => r.ok ? r.json() : [])
  .then(list => {
    if(!Array.isArray(list) || list.length === 0){
      frame.style.display='none'; empty.style.display='block'; meta.textContent='No reports yet';
      return;
    }
    list.forEach((e, i) => {
      const o = document.createElement('option');
      o.value = i;
      o.textContent = e.for_date + (i===0 ? ' · newest' : '') + ' · ' + fmt(e.generated_at);
      picker.appendChild(o);
    });
    picker.addEventListener('change', () => load(list[picker.value]));
    load(list[0]);
  })
  .catch(() => { frame.style.display='none'; empty.style.display='block'; meta.textContent='Could not load manifest'; });
</script>
</body>
</html>
